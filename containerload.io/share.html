<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#070a0f;color:#eef2f7;font-family:'Inter',ui-sans-serif,system-ui,-apple-system,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}
  .bg{position:fixed;inset:0;background:radial-gradient(60% 50% at 80% 0%,rgba(21,64,122,.6),transparent),radial-gradient(50% 40% at 0% 100%,rgba(15,61,58,.5),transparent)}
  .wrap{position:relative;text-align:center;padding:24px;max-width:440px}
  .logo{display:inline-flex;align-items:center;gap:10px;margin-bottom:28px}
  .mark{width:40px;height:40px;border-radius:11px;background:linear-gradient(135deg,#2f9bff,#38e0c8);display:flex;align-items:center;justify-content:center;box-shadow:0 8px 26px -8px rgba(47,155,255,.7)}
  .word{font-size:21px;font-weight:800;letter-spacing:-.02em}
  .grad{background:linear-gradient(90deg,#2f9bff,#38e0c8);-webkit-background-clip:text;background-clip:text;color:transparent}
  .eyebrow{font-family:'JetBrains Mono',ui-monospace,monospace;font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:#38e0c8;margin-bottom:14px}
  h1{font-size:27px;font-weight:800;letter-spacing:-.02em;line-height:1.15;margin-bottom:12px}
  p{color:#9aa7b8;font-size:15px;line-height:1.55;margin-bottom:26px}
  .spin{width:26px;height:26px;border:3px solid rgba(47,155,255,.25);border-top-color:#2f9bff;border-radius:50%;animation:sp .7s linear infinite;margin:0 auto 22px}
  @keyframes sp{to{transform:rotate(360deg)}}
  .btn{display:inline-flex;align-items:center;gap:8px;background:linear-gradient(135deg,#2f9bff,#38e0c8);color:#04101f;font-weight:700;font-size:15px;padding:13px 26px;border-radius:12px;text-decoration:none;transition:filter .15s}
  .btn:hover{filter:brightness(1.08)}
  .foot{margin-top:22px;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:11px;color:#67748a}
</style>

<div class="bg"></div>
<div class="wrap">
  <div class="logo">
    <span class="mark"><svg width="22" height="22" viewBox="0 0 24 24"><rect x="3" y="7" width="18" height="11" rx="1.5" fill="none" stroke="#04101f" stroke-width="2"/><rect x="5" y="9.3" width="2.3" height="6.4" rx="0.5" fill="#04101f"/><rect x="7.9" y="9.3" width="2.3" height="6.4" rx="0.5" fill="#04101f"/><rect x="10.8" y="9.3" width="2.3" height="6.4" rx="0.5" fill="#04101f"/></svg></span>

  <p>Du siehst gleich in 3D, wie die Ladung in den Container passt – interaktiv, ohne Login.</p>
  <div class="spin" id="spin"></div>
  <a class="btn" id="go" href="app.html">Stauplan öffnen →</a>
  <div class="foot">containerload.io</div>
</div>
<script>
  (function () {
    var search = window.location.search || "";
    var target = "app.html" + search;
    var go = document.getElementById("go");
    if (go) go.setAttribute("href", target);
    // give the branded screen a brief moment, then forward into the tool
    setTimeout(function () {
      try { window.location.replace(target); } catch (e) { window.location.href = target; }
    }, 450);
  })();
</script>
<noscript><div style="position:fixed;bottom:16px;left:0;right:0;text-align:center;color:#9aa7b8;font-size:13px">Bitte JavaScript aktivieren oder den Button „Stauplan öffnen" klicken.</div></noscript>
